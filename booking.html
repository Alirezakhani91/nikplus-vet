<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزرو نوبت | نیک‌پلاس</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { vazir: ['Vazirmatn', 'sans-serif'] },
        colors: {
          cream: '#FAF9F5',
          ink: '#16231F',
          forest: '#1F5C52',
          forestDark: '#153F38',
          sage: '#7FA793',
          lagoon: '#4E9C93',
          mist: '#E7EFE9',
          coral: '#E8926A',
        }
      }
    }
  }
</script>
<style>
  * { font-family: 'Vazirmatn', sans-serif; }
  .spinner {
    border: 3px solid rgba(31,92,82,0.15);
    border-top-color: #1F5C52;
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-dot { transition: all .25s ease; }
  .card-select {
    transition: all .18s ease;
  }
  .card-select.selected {
    border-color: #1F5C52;
    background: #E7EFE9;
    box-shadow: 0 0 0 2px rgba(31,92,82,0.15);
  }
  .slot-btn.selected {
    background: #1F5C52;
    color: white;
  }
</style>
</head>
<body class="bg-cream text-ink antialiased min-h-screen">

<!-- ===================== NAVBAR ===================== -->
<header class="sticky top-0 z-50 bg-cream/85 backdrop-blur-md border-b border-ink/[0.06]">
  <div class="max-w-3xl mx-auto px-6 h-20 flex items-center justify-between">
    <a href="dashboard.html" class="flex items-center gap-2.5">
      <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="#1F5C52" stroke-width="1.4"/>
        <path d="M13 22c0-4 3-7 7-7s7 3 7 7-3 5-7 5-7-1-7-5Z" fill="#1F5C52"/>
        <circle cx="14.5" cy="14" r="2.1" fill="#1F5C52"/>
        <circle cx="19.5" cy="11.5" r="2.1" fill="#1F5C52"/>
        <circle cx="25.5" cy="14" r="2.1" fill="#1F5C52"/>
      </svg>
      <span class="text-lg font-extrabold tracking-tight text-forestDark">نیک‌پلاس</span>
    </a>
    <a href="dashboard.html" class="text-sm font-bold text-ink/50 hover:text-forest transition-colors">بازگشت به داشبورد</a>
  </div>
</header>

<!-- ===================== LOADING ===================== -->
<div id="pageLoading" class="flex flex-col items-center justify-center py-32 gap-4">
  <div class="spinner"></div>
  <p class="text-sm text-ink/40">در حال بارگذاری...</p>
</div>

<!-- ===================== MAIN ===================== -->
<main id="pageContent" class="hidden max-w-3xl mx-auto px-6 py-10">

  <h1 class="text-2xl font-extrabold text-forestDark mb-2">رزرو نوبت جدید</h1>
  <p class="text-sm text-ink/45 mb-8">مراحل زیر را یکی‌یکی تکمیل کنید</p>

  <!-- progress steps -->
  <div class="flex items-center gap-2 mb-10">
    <div class="step-dot flex-1 h-1.5 rounded-full bg-forest" data-step-indicator="1"></div>
    <div class="step-dot flex-1 h-1.5 rounded-full bg-ink/10" data-step-indicator="2"></div>
    <div class="step-dot flex-1 h-1.5 rounded-full bg-ink/10" data-step-indicator="3"></div>
    <div class="step-dot flex-1 h-1.5 rounded-full bg-ink/10" data-step-indicator="4"></div>
  </div>

  <!-- ===== STEP 1: SERVICE ===== -->
  <section id="step1" class="step-panel">
    <h2 class="text-lg font-bold text-forestDark mb-5">۱. انتخاب خدمت</h2>
    <div id="servicesList" class="grid sm:grid-cols-2 gap-4"></div>
    <p id="servicesEmpty" class="hidden text-sm text-ink/40 text-center py-8">خدمتی برای نمایش وجود ندارد.</p>
  </section>

  <!-- ===== STEP 2: DOCTOR ===== -->
  <section id="step2" class="step-panel hidden">
    <h2 class="text-lg font-bold text-forestDark mb-5">۲. انتخاب دامپزشک</h2>
    <div id="doctorsList" class="grid sm:grid-cols-2 gap-4"></div>
    <p id="doctorsEmpty" class="hidden text-sm text-ink/40 text-center py-8">دامپزشکی برای نمایش وجود ندارد.</p>
    <button data-back="1" class="back-btn mt-6 text-sm font-bold text-ink/50 hover:text-forest transition-colors">◂ بازگشت</button>
  </section>

  <!-- ===== STEP 3: DATE & TIME ===== -->
  <section id="step3" class="step-panel hidden">
    <h2 class="text-lg font-bold text-forestDark mb-5">۳. انتخاب روز و ساعت</h2>
    <div class="mb-6">
      <label class="block text-sm font-bold text-forestDark mb-2">تاریخ مراجعه</label>
      <input type="hidden" id="dateInput">
      <div id="dateInputMount"></div>
    </div>
    <div id="slotsWrap" class="hidden">
      <label class="block text-sm font-bold text-forestDark mb-2">ساعت‌های نوبت‌دهی</label>
      <div class="flex items-center gap-4 mb-3 text-xs text-ink/45">
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded border border-ink/15 bg-white inline-block"></span> خالی</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-forest inline-block"></span> انتخاب‌شده</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-ink/10 inline-block"></span> رزروشده</span>
      </div>
      <div id="slotsList" class="grid grid-cols-4 sm:grid-cols-6 gap-2.5"></div>
    </div>
    <button data-back="2" class="back-btn mt-6 text-sm font-bold text-ink/50 hover:text-forest transition-colors">◂ بازگشت</button>
  </section>

  <!-- ===== STEP 4: PET INFO + CONFIRM ===== -->
  <section id="step4" class="step-panel hidden">
    <h2 class="text-lg font-bold text-forestDark mb-5">۴. اطلاعات حیوان خانگی و تایید نهایی</h2>

    <div class="bg-white rounded-2xl border border-ink/[0.06] p-6 mb-6 text-sm space-y-1.5" id="summaryBox"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">نام حیوان خانگی</label>
        <input type="text" id="petName" required placeholder="مثلاً: لوسی"
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm">
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">یادداشت (اختیاری)</label>
        <textarea id="notes" rows="3" placeholder="توضیح مختصری درباره علت مراجعه..."
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm"></textarea>
      </div>
    </div>

    <p id="submitError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3 mt-4"></p>

    <div class="flex items-center gap-3 mt-7">
      <button data-back="3" class="back-btn text-sm font-bold text-ink/50 hover:text-forest transition-colors">◂ بازگشت</button>
      <button id="submitBtn" class="flex-1 bg-forest hover:bg-forestDark text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-forest/25 flex items-center justify-center gap-2">
        <span>ثبت نهایی نوبت</span>
      </button>
    </div>
  </section>

</main>

<!-- ===================== DOCTOR REVIEWS MODAL ===================== -->
<div id="doctorReviewsModal" class="hidden fixed inset-0 z-[70] bg-ink/45 backdrop-blur-sm flex items-center justify-center px-4 py-6">
  <div class="bg-white rounded-[2rem] border border-ink/[0.06] shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden">
    <div class="flex items-center justify-between gap-4 px-6 py-5 border-b border-ink/[0.06]">
      <div>
        <h3 id="doctorReviewsModalTitle" class="text-lg sm:text-xl font-extrabold text-forestDark">
          نظرات پزشک
        </h3>
        <p id="doctorReviewsModalMeta" class="text-xs text-ink/45 mt-1"></p>
      </div>

      <button
        id="closeDoctorReviewsModalBtn"
        type="button"
        aria-label="بستن پنجره نظرات"
        class="w-10 h-10 rounded-full bg-mist text-forest hover:bg-forest hover:text-white transition-colors flex items-center justify-center shrink-0"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div id="doctorReviewsModalBody" class="p-6 overflow-y-auto max-h-[calc(90vh-96px)] space-y-3"></div>
  </div>
</div>

<script src="supabase-client.js"></script>
<script src="jalali.js"></script>
<script>
  let currentUser = null;
  let selectedService = null;
  let selectedDoctor = null;
  let selectedDate = null;
  let selectedTime = null;
  const doctorReviewsStore = new Map();

  function formatDoctorName(fullName) {
    const clean = (fullName || '').trim().replace(/^دکتر\s+/, '');
    return clean ? 'دکتر ' + clean : 'دکتر';
  }

  function getDoctorInitials(fullName) {
    const clean = (fullName || '').trim().replace(/^دکتر\s+/, '');
    const parts = clean.split(/\s+/).filter(Boolean);
    if (parts.length >= 2) return parts[0][0] + '.' + parts[1][0];
    if (parts.length === 1) return parts[0][0];
    return '؟';
  }

  function escapeReviewText(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function renderReviewStars(rating) {
    const roundedRating = Math.round(Number(rating) || 0);

    return [1, 2, 3, 4, 5]
      .map(star => `
        <span class="${star <= roundedRating ? 'text-amber-400' : 'text-ink/15'}">★</span>
      `)
      .join('');
  }

  function formatReviewDate(dateValue) {
    if (!dateValue) return '';

    try {
      return new Intl.DateTimeFormat('fa-IR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }).format(new Date(dateValue));
    } catch {
      return '';
    }
  }

  function buildReviewCard(review) {
    return `
      <article class="bg-cream/80 border border-ink/[0.06] rounded-2xl p-4 text-right">
        <div class="flex items-center justify-between gap-3 mb-2">
          <div class="flex items-center gap-0.5 text-sm" dir="ltr">
            ${renderReviewStars(review.rating)}
          </div>

          <span class="text-[11px] font-bold text-forest bg-mist px-2.5 py-1 rounded-full">
            مراجع تأییدشده
          </span>
        </div>

        <p class="text-sm text-ink/65 leading-7">
          ${escapeReviewText(review.review_text)}
        </p>

        <p class="text-[11px] text-ink/35 mt-3">
          ${formatReviewDate(review.created_at)}
        </p>
      </article>
    `;
  }

  function openDoctorReviewsModal(doctorId) {
    const doctorData = doctorReviewsStore.get(String(doctorId));
    if (!doctorData) return;

    const modal = document.getElementById('doctorReviewsModal');
    const title = document.getElementById('doctorReviewsModalTitle');
    const meta = document.getElementById('doctorReviewsModalMeta');
    const body = document.getElementById('doctorReviewsModalBody');

    title.textContent = `نظرات ${doctorData.name}`;

    meta.textContent = doctorData.reviewCount
      ? `میانگین امتیاز ${doctorData.averageRating.toFixed(1)} از ۵ • ${doctorData.reviewCount} نظر ثبت‌شده`
      : 'هنوز نظری برای این پزشک ثبت نشده است.';

    body.innerHTML = doctorData.reviewCount
      ? doctorData.reviews.map(buildReviewCard).join('')
      : `
        <div class="bg-cream/80 border border-ink/[0.06] rounded-2xl p-6 text-center">
          <p class="text-sm text-ink/45">هنوز نظری برای این پزشک ثبت نشده است.</p>
        </div>
      `;

    modal.classList.remove('hidden');
    document.body.classList.add('overflow-hidden');
  }

  function closeDoctorReviewsModal() {
    document.getElementById('doctorReviewsModal').classList.add('hidden');
    document.body.classList.remove('overflow-hidden');
  }

  document.getElementById('closeDoctorReviewsModalBtn').addEventListener('click', closeDoctorReviewsModal);

  document.getElementById('doctorReviewsModal').addEventListener('click', event => {
    if (event.target.id === 'doctorReviewsModal') {
      closeDoctorReviewsModal();
    }
  });

  function showStep(n) {
    document.querySelectorAll('.step-panel').forEach((el, i) => {
      el.classList.toggle('hidden', i !== n - 1);
    });
    document.querySelectorAll('[data-step-indicator]').forEach(dot => {
      const step = parseInt(dot.dataset.stepIndicator);
      dot.classList.toggle('bg-forest', step <= n);
      dot.classList.toggle('bg-ink/10', step > n);
    });
  }

  document.querySelectorAll('.back-btn').forEach(btn => {
    btn.addEventListener('click', () => showStep(parseInt(btn.dataset.back)));
  });

  // ---------- STEP 1: services ----------
  async function loadServices() {
    const { data: services, error } = await supabaseClient
      .from('services')
      .select('*')
      .order('created_at', { ascending: true });

    const list = document.getElementById('servicesList');
    if (error || !services || services.length === 0) {
      document.getElementById('servicesEmpty').classList.remove('hidden');
      return;
    }

    list.innerHTML = services.map(s => `
      <button data-id="${s.id}" class="card-select service-card text-right bg-white border border-ink/10 rounded-2xl p-5 hover:border-forest/40 transition-all">
        <h3 class="font-bold text-forestDark mb-1">${s.title}</h3>
        <p class="text-xs text-ink/50 leading-6">${s.description ?? ''}</p>
        <p class="text-xs text-forest font-bold mt-2">${s.duration_minutes ? s.duration_minutes + ' دقیقه' : ''}</p>
      </button>
    `).join('');

    list.querySelectorAll('.service-card').forEach(card => {
      card.addEventListener('click', () => {
        selectedService = services.find(s => s.id == card.dataset.id);
        list.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        setTimeout(() => showStep(2), 150);
      });
    });
  }

  // ---------- STEP 2: doctors ----------
  async function loadDoctors() {
    const { data: doctors, error } = await supabaseClient
      .from('doctors')
      .select('id, specialty, bio, photo_url, profiles ( full_name )');

    const list = document.getElementById('doctorsList');

    if (error || !doctors || doctors.length === 0) {
      document.getElementById('doctorsEmpty').classList.remove('hidden');
      console.error('خطا در دریافت پزشکان:', error);
      return;
    }

    const doctorIds = doctors.map(doctor => doctor.id);

    const { data: reviews, error: reviewsError } = await supabaseClient
      .from('doctor_reviews')
      .select('id, doctor_id, rating, review_text, created_at')
      .in('doctor_id', doctorIds)
      .order('created_at', { ascending: false });

    if (reviewsError) {
      console.error('خطا در دریافت نظرات پزشکان:', reviewsError);
    }

    const reviewsByDoctor = new Map();

    (reviews || []).forEach(review => {
      const key = String(review.doctor_id);
      if (!reviewsByDoctor.has(key)) reviewsByDoctor.set(key, []);
      reviewsByDoctor.get(key).push(review);
    });

    doctorReviewsStore.clear();

    doctors.forEach(doctor => {
      const doctorReviews = reviewsByDoctor.get(String(doctor.id)) || [];
      const reviewCount = doctorReviews.length;
      const averageRating = reviewCount
        ? doctorReviews.reduce((sum, item) => sum + Number(item.rating || 0), 0) / reviewCount
        : 0;

      doctor.reviewCount = reviewCount;
      doctor.averageRating = averageRating;

      doctorReviewsStore.set(String(doctor.id), {
        name: formatDoctorName(doctor.profiles?.full_name),
        reviews: doctorReviews,
        reviewCount,
        averageRating
      });
    });

    list.innerHTML = doctors.map(doctor => {
      const name = formatDoctorName(doctor.profiles?.full_name);
      const initials = getDoctorInitials(doctor.profiles?.full_name);

      const photoMarkup = doctor.photo_url
        ? `
          <div class="relative w-20 h-20 shrink-0">
            <img
              src="${doctor.photo_url}"
              alt="عکس ${name}"
              loading="lazy"
              class="w-20 h-20 rounded-full object-cover border-4 border-mist shadow-sm"
              onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('flex');"
            >

            <div class="hidden w-20 h-20 rounded-full bg-mist items-center justify-center text-xl font-extrabold text-forest">
              ${initials}
            </div>
          </div>
        `
        : `
          <div class="w-20 h-20 rounded-full bg-mist flex items-center justify-center text-xl font-extrabold text-forest shrink-0">
            ${initials}
          </div>
        `;

      return `
        <article
          data-doctor-card="${doctor.id}"
          class="card-select doctor-card bg-white border border-ink/10 rounded-2xl p-5 transition-all"
        >
          <div class="flex items-start gap-4">
            ${photoMarkup}

            <div class="min-w-0 flex-1 text-right">
              <h3 class="font-extrabold text-forestDark">
                ${name}
              </h3>

              <p class="text-xs text-forest font-bold mt-1">
                ${doctor.specialty || 'دامپزشک نیک‌پلاس'}
              </p>

              ${doctor.reviewCount ? `
                <div class="mt-2 flex flex-wrap items-center gap-2">
                  <div class="flex items-center gap-0.5 text-sm" dir="ltr">
                    ${renderReviewStars(doctor.averageRating)}
                  </div>

                  <span class="text-xs font-extrabold text-forestDark">
                    ${doctor.averageRating.toFixed(1)}
                  </span>

                  <span class="text-[11px] text-ink/40">
                    از ${doctor.reviewCount} نظر
                  </span>
                </div>
              ` : `
                <p class="text-[11px] text-ink/35 mt-2">
                  هنوز نظری ثبت نشده است.
                </p>
              `}
            </div>
          </div>

          ${doctor.bio ? `
            <p class="text-xs text-ink/50 leading-6 mt-4 text-right">
              ${doctor.bio}
            </p>
          ` : ''}

          <div class="grid ${doctor.reviewCount ? 'grid-cols-2' : 'grid-cols-1'} gap-2 mt-4">
            <button
              type="button"
              data-select-doctor="${doctor.id}"
              class="select-doctor-btn bg-forest hover:bg-forestDark text-white text-xs font-bold px-4 py-3 rounded-xl transition-colors"
            >
              انتخاب این پزشک
            </button>

            ${doctor.reviewCount ? `
              <button
                type="button"
                data-view-doctor-reviews="${doctor.id}"
                class="view-doctor-reviews-btn bg-mist hover:bg-forest hover:text-white text-forest text-xs font-bold px-4 py-3 rounded-xl transition-colors"
              >
                مشاهده نظرات
              </button>
            ` : ''}
          </div>
        </article>
      `;
    }).join('');

    list.querySelectorAll('.select-doctor-btn').forEach(button => {
      button.addEventListener('click', () => {
        selectedDoctor = doctors.find(doctor => String(doctor.id) === String(button.dataset.selectDoctor));

        list.querySelectorAll('.doctor-card').forEach(card => {
          card.classList.remove('selected');
        });

        const selectedCard = list.querySelector(`[data-doctor-card="${button.dataset.selectDoctor}"]`);
        selectedCard?.classList.add('selected');

        setTimeout(() => showStep(3), 150);
      });
    });

    list.querySelectorAll('.view-doctor-reviews-btn').forEach(button => {
      button.addEventListener('click', () => {
        openDoctorReviewsModal(button.dataset.viewDoctorReviews);
      });
    });
  }

  // ---------- STEP 3: date & time ----------
  function timeToMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }
  function minutesToTime(mins) {
    const h = Math.floor(mins / 60).toString().padStart(2, '0');
    const m = (mins % 60).toString().padStart(2, '0');
    return `${h}:${m}`;
  }

  document.getElementById('dateInput').addEventListener('change', async (e) => {
    selectedDate = e.target.value;
    selectedTime = null;
    const slotsWrap = document.getElementById('slotsWrap');
    const slotsList = document.getElementById('slotsList');
    slotsWrap.classList.remove('hidden');
    slotsList.innerHTML = '<p class="text-sm text-ink/40 col-span-full">در حال بررسی ساعت‌های نوبت‌دهی...</p>';

    if (!selectedDate) return;

    // ساعت‌های کاری دکتر برای همین تاریخ دقیق (تنظیم‌شده توسط خودش)
    const { data: overrides } = await supabaseClient
      .from('doctor_date_overrides')
      .select('start_time, end_time')
      .eq('doctor_id', selectedDoctor.id)
      .eq('specific_date', selectedDate);

    const allWindows = overrides || [];

    if (allWindows.length === 0) {
      slotsList.innerHTML = `<p class="text-sm text-ink/40 col-span-full">دامپزشک انتخابی برای تاریخ ${JalaliUtil.formatJalaliDisplay(selectedDate, true)} نوبت‌دهی تعریف نکرده است. تاریخ دیگری را انتخاب کنید.</p>`;
      return;
    }

    // نوبت‌های از قبل رزروشده همین دامپزشک در همین تاریخ
    const { data: booked } = await supabaseClient
      .from('appointments')
      .select('appointment_time')
      .eq('doctor_id', selectedDoctor.id)
      .eq('appointment_date', selectedDate)
      .neq('status', 'cancelled');

    const bookedTimes = new Set((booked || []).map(b => b.appointment_time?.slice(0, 5)));

    // ساخت نوبت‌های نیم‌ساعته در بازه‌های کاری تعریف‌شده برای این تاریخ
    let slots = [];
    allWindows.forEach(win => {
      let start = timeToMinutes(win.start_time);
      const end = timeToMinutes(win.end_time);
      while (start + 30 <= end) {
        slots.push(minutesToTime(start));
        start += 30;
      }
    });
    slots = [...new Set(slots)].sort();

    if (slots.length === 0) {
      slotsList.innerHTML = '<p class="text-sm text-ink/40 col-span-full">در این روز نوبت خالی وجود ندارد.</p>';
      return;
    }

    slotsList.innerHTML = slots.map(s => {
      const isBooked = bookedTimes.has(s);
      return `
        <button
          data-time="${s}"
          ${isBooked ? 'disabled' : ''}
          class="slot-btn px-2 py-2.5 rounded-xl border text-sm font-bold transition-all text-center
            ${isBooked
              ? 'bg-ink/[0.06] text-ink/25 border-ink/[0.06] cursor-not-allowed'
              : 'bg-white text-ink/70 border-ink/10 hover:border-forest/40 cursor-pointer'}">
          ${s}
        </button>
      `;
    }).join('');

    slotsList.querySelectorAll('.slot-btn:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedTime = btn.dataset.time;
        slotsList.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        setTimeout(() => { buildSummary(); showStep(4); }, 150);
      });
    });
  });

  // ---------- STEP 4: summary + submit ----------
  function buildSummary() {
    const box = document.getElementById('summaryBox');
    const doctorName = formatDoctorName(selectedDoctor.profiles?.full_name);
    const doctorInitials = getDoctorInitials(selectedDoctor.profiles?.full_name);

    const summaryPhoto = selectedDoctor.photo_url
      ? `
        <img
          src="${selectedDoctor.photo_url}"
          alt="عکس ${doctorName}"
          class="w-16 h-16 rounded-full object-cover border-4 border-mist shrink-0"
          onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('flex');"
        >
        <div class="hidden w-16 h-16 rounded-full bg-mist items-center justify-center text-lg font-extrabold text-forest shrink-0">
          ${doctorInitials}
        </div>
      `
      : `
        <div class="w-16 h-16 rounded-full bg-mist flex items-center justify-center text-lg font-extrabold text-forest shrink-0">
          ${doctorInitials}
        </div>
      `;

    box.innerHTML = `
      <div class="flex items-center gap-4 pb-4 mb-4 border-b border-ink/[0.06]">
        ${summaryPhoto}

        <div>
          <p class="font-extrabold text-forestDark">${doctorName}</p>
          <p class="text-xs text-forest font-bold mt-1">${selectedDoctor.specialty || 'دامپزشک نیک‌پلاس'}</p>

          ${selectedDoctor.reviewCount ? `
            <div class="flex items-center gap-2 mt-1.5">
              <div class="flex items-center gap-0.5 text-xs" dir="ltr">
                ${renderReviewStars(selectedDoctor.averageRating)}
              </div>
              <span class="text-[11px] text-ink/45">
                ${selectedDoctor.averageRating.toFixed(1)} از ${selectedDoctor.reviewCount} نظر
              </span>
            </div>
          ` : ''}
        </div>
      </div>

      <p><span class="text-ink/40">خدمت:</span> <span class="font-bold">${selectedService.title}</span></p>
      <p><span class="text-ink/40">تاریخ:</span> <span class="font-bold">${JalaliUtil.formatJalaliDisplay(selectedDate, true)}</span></p>
      <p><span class="text-ink/40">ساعت:</span> <span class="font-bold">${selectedTime}</span></p>
    `;
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const errorBox = document.getElementById('submitError');
    errorBox.classList.add('hidden');

    const petName = document.getElementById('petName').value.trim();
    const notes = document.getElementById('notes').value.trim();

    if (!petName) {
      errorBox.textContent = 'لطفاً نام حیوان خانگی را وارد کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>در حال ثبت...</span>';

    const { error } = await supabaseClient.from('appointments').insert({
      patient_id: currentUser.id,
      doctor_id: selectedDoctor.id,
      service_id: selectedService.id,
      pet_name: petName,
      appointment_date: selectedDate,
      appointment_time: selectedTime,
      status: 'pending',
      notes: notes || null,
    });

    if (error) {
      console.error(error);
      btn.disabled = false;
      btn.innerHTML = '<span>ثبت نهایی نوبت</span>';
      errorBox.textContent = 'خطا در ثبت نوبت. ممکن است این ساعت هم‌اکنون توسط شخص دیگری رزرو شده باشد. لطفاً دوباره تلاش کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    window.location.href = 'dashboard.html';
  });

  // ---------- INIT ----------
  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'auth.html';
      return;
    }
    currentUser = session.user;

    // راه‌اندازی تقویم شمسی برای انتخاب تاریخ
    const today = new Date().toISOString().split('T')[0];
    JalaliUtil.attachPicker(
      document.getElementById('dateInput'),
      document.getElementById('dateInputMount'),
      { minDateISO: today }
    );

    await Promise.all([loadServices(), loadDoctors()]);

    document.getElementById('pageLoading').classList.add('hidden');
    document.getElementById('pageContent').classList.remove('hidden');
    showStep(1);
  }

  init();
</script>

</body>
</html>
